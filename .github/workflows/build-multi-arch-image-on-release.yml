name: Build Multi-Arch Image on Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Prepare platform tag-safe name
        run: echo "PLATFORM_PAIR=$(echo ${{ matrix.platform }} | sed 's|/|-|g')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ secrets.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./fedora-dev-build/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ secrets.GHCR_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ secrets.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          mapfile -t tags < <(jq -r '.tags[] | "-t", .' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          mapfile -t annotations < <(jq -r '.annotations[] | "--annotation", ("index:" + ltrimstr("manifest:"))' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          mapfile -t digests < <(printf '${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ secrets.GHCR_IMAGE_NAME }}@sha256:%s\n' *)
          docker buildx imagetools create "${tags[@]}" "${annotations[@]}" "${digests[@]}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ secrets.GHCR_IMAGE_NAME }}:latest

      - name: Generate release notes
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ secrets.GHCR_IMAGE_NAME }}:latest"
          docker pull "$IMAGE"

          TOOLS=$(docker run --rm "$IMAGE" bash -c '
            set +e
            echo "pwsh:           $(pwsh --version 2>/dev/null | awk "{print \$2}")"
            echo "terraform:      $(terraform version 2>/dev/null | head -1 | awk "{print \$2}")"
            echo "terraform-docs: $(terraform-docs --version 2>/dev/null | grep -oP "v\d+\.\d+\.\d+")"
            echo "helm:           $(helm version --short 2>/dev/null | cut -d+ -f1)"
            echo "kubectl:        $(kubectl version --client --output=yaml 2>/dev/null | grep gitVersion | head -1 | grep -oP "v\d+\.\d+\.\d+")"
            echo "ansible:        $(ansible --version 2>/dev/null | head -1 | grep -oP "\d+\.\d+\.\d+")"
            echo "kustomize:      $(kustomize version 2>/dev/null)"
            echo "azure-cli:      $(az --version 2>/dev/null | head -1 | awk "{print \$2}")"
            echo "oc:             $(oc version --client 2>/dev/null | awk "{print \$NF}" | head -1)"
            echo "python:         $(python --version 2>/dev/null | awk "{print \$2}")"
            echo "yq:             $(yq --version 2>/dev/null | head -1)"
            echo "zsh:            $(zsh --version 2>/dev/null | awk "{print \$2}") (oh-my-zsh)"
            echo "brew:           $(brew --version 2>/dev/null | head -1 | awk "{print \$2}")"
            exit 0
          ' 2>&1 || true)

          {
            echo "## 📦 DNF Packages"
            echo ""
            echo "Installed via \`dnf install\`:"
            echo ""
            DNF_PKGS=$(sed -n '/^RUN dnf -y install/,/&& dnf -y clean/p' ./fedora-dev-build/Dockerfile \
              | grep -v '^RUN\|&& dnf' \
              | tr -d ' \t\\' \
              | grep -v '^$')
            while IFS= read -r pkg; do
              echo "- \`$pkg\`"
            done <<< "$DNF_PKGS"
            echo ""
            echo "## 🛠️ Installed Tools"
            echo ""
            echo "\`\`\`"
            echo "$TOOLS"
            echo "\`\`\`"
          } > /tmp/release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            --latest
